name: Lint and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff
        run: ruff check . && ruff format --check .

      - name: Run mypy
        run: mypy app

      - name: Run bandit
        run: bandit -r app -ll

      - name: Run pip-audit
        run: pip-audit --ignore-vuln CVE-2026-1703 --ignore-vuln CVE-2026-3219

      - name: Run pytest
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=90
